<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | MetroPath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="contact">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="./dashboard.html">
        <span class="brand-mark">MP</span>
        <span>MetroPath</span>
      </a>
      <button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">Menu</button>
      <nav class="site-nav" id="siteNav">
        <a href="./dashboard.html" data-nav="home">Dashboard</a>
        <a href="./planner.html" data-nav="planner">Planner</a>
        <a href="./network.html" data-nav="network">Network</a>
        <a href="./manage.html" data-nav="manage">Manage</a>
        <a href="./contact.html" data-nav="contact">Contact</a>
      </nav>
      <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
    </div>
  </header>

  <main class="container section">
    <h2>Contact</h2>
    <p class="lead">Reach the operations team, request data changes, or flag route issues from one clean panel.</p>
    <section class="panel panel-pad fade-up">
      <form class="grid" id="contactForm">
        <div class="input-wrap">
          <label for="fullName">Name</label>
          <input id="fullName" required>
        </div>
        <div class="input-wrap">
          <label for="email">Email</label>
          <input id="email" type="email" required>
        </div>
        <div class="input-wrap">
          <label for="message">Message</label>
          <textarea id="message" rows="5" required></textarea>
        </div>
        <button class="btn btn-primary" type="submit">Send Message</button>
        <div id="contactNotice"></div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="container">MetroPath frontend prototype. Copyright <span id="year"></span>.</div>
  </footer>

  <script src="./assets/js/app.js"></script>
  <script>
    (function () {
      var form = document.getElementById("contactForm");
      var notice = document.getElementById("contactNotice");
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        notice.className = "notice";
        notice.textContent = "Message received. Wire this form to your backend mail service endpoint.";
        form.reset();
      });
    })();
  </script>
</body>
</html>
